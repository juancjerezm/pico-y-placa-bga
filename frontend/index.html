<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Consultá si tu carro tiene Pico y Placa hoy en Bucaramanga y el área metropolitana." />
    <meta name="theme-color" content="#0a0f1f" />
    <title>Pico y Placa — Bucaramanga AMB</title>
    <meta property="og:title" content="Pico y Placa — Bucaramanga AMB" />
    <meta property="og:description" content="Consultá si tu carro tiene Pico y Placa hoy. Datos oficiales DTB. Contador en vivo." />
    <meta property="og:image" content="https://pico-y-placa-bga.vercel.app/og-image.svg" />
    <meta property="og:url" content="https://pico-y-placa-bga.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pico y Placa BGA" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%2311182b'/%3E%3Cstop offset='1' stop-color='%230a0f1f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='12' fill='url(%23g)' stroke='%23f59e0b' stroke-width='2.5'/%3E%3Ctext x='32' y='28' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-weight='900' font-size='6' fill='%2394a3b8' letter-spacing='4'%3EPICO%3C/text%3E%3Ctext x='32' y='51' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-weight='900' font-size='24' fill='%23f59e0b'%3E3%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <section id="hero" class="hero">
        <h1 class="hero-title">PICO Y PLACA</h1>
        <span class="hero-label" id="hero-label">Cargando…</span>
        <div class="hero-digit-container" id="hero-digit-container">
          <span class="hero-digit hero-digit--loading" id="hero-digit" aria-live="polite">···</span>
        </div>
        <span class="hero-sub" id="hero-sub"></span>
        <span class="hero-timer" id="hero-timer"></span>
        <div class="hero-progress" id="hero-progress">
          <div class="hero-progress-bar" id="hero-progress-bar"></div>
        </div>
      </section>

      <section id="input-section" class="input-section">
        <div class="input-group">
          <label for="plate-input" class="input-label">Placa</label>
          <div class="plate-input-wrapper">
            <input
              type="text"
              id="plate-input"
              class="plate-input"
              maxlength="10"
              placeholder="ABC123"
              autocomplete="off"
              inputmode="text"
            />
            <span class="live-digit" id="live-digit" aria-live="polite"></span>
          </div>
          <span class="input-hint" id="input-hint"></span>
        </div>

        <div class="input-group">
          <label for="municipio-select" class="input-label">Municipio</label>
          <div class="custom-select-wrapper">
            <select id="municipio-select" class="custom-select">
              <option value="bucaramanga">Bucaramanga</option>
              <option value="floridablanca">Floridablanca</option>
              <option value="giron">Girón</option>
              <option value="piedecuesta">Piedecuesta</option>
            </select>
            <span class="select-arrow" aria-hidden="true">▾</span>
          </div>
        </div>

        <div class="input-group">
          <label for="date-input" class="input-label">Fecha</label>
          <input type="date" id="date-input" class="date-input" />
        </div>

        <button type="button" id="consultar-btn" class="btn-consultar">
          Consultar
        </button>
      </section>

      <section id="result" class="result result--hidden" aria-live="polite">
        <div class="result-inner">
          <div class="result-status" id="result-status"></div>
          <p class="result-message" id="result-message"></p>
        </div>
      </section>

      <footer class="site-footer">
        <a href="https://convertixweb.app" target="_blank" rel="noopener">Hecho por Convertix</a>
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
