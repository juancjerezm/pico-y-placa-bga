# Pico y Placa Bucaramanga — Cloudflare Worker API
# Read-only queries against Supabase Postgres
name = "pico-y-placa-api"
main = "src/index.ts"
compatibility_date = "2025-06-10"
compatibility_flags = ["nodejs_compat"]

# Free-tier: 100k requests/day, 10ms CPU/request
# Rate-limited at 100 req/min per IP (Nivel 1 MVP security)

[vars]
# DATABASE_URL is a SECRET — set via `wrangler secret put DATABASE_URL`
# Format: postgres://user:password@host:6543/postgres?sslmode=require
# Use Supabase Transaction pooler port (6543) for serverless compatibility

[observability]
enabled = true
head_sampling_rate = 1

# Security headers are applied in-code (see src/index.ts):
# X-Content-Type-Options, X-Frame-Options, Referrer-Policy, HSTS, X-XSS-Protection
# Rate limiting is applied in-code (100 req/min per IP).
# Cloudflare WAF rate limiting can be added via dashboard for DDoS protection.
